<!doctype html>
<html lang="bn">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>আমার প্রজেক্ট সমূহ - bbinl</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background: linear-gradient(120deg, #1e1e2f, #2c2c54);
            color: white;
            text-align: center;
            padding: 50px 20px;
        }
        h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }
        p {
            font-size: 1.1em;
            color: #ccc;
            margin-bottom: 40px;
        }
        .projects {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
        }
        .project-card {
            background: #29294d;
            padding: 20px;
            border-radius: 12px;
            width: 250px;
            transition: transform 0.2s, background 0.3s;
        }
        .project-card:hover {
            transform: translateY(-5px);
            background: #3e3e70;
        }
        a {
            color: #00ffcc;
            text-decoration: none;
            font-weight: bold;
        }
        footer {
            margin-top: 50px;
            font-size: 0.9em;
            color: #777;
        }
    </style>
</head>
<body>

    <h1>আমার প্রজেক্ট সমূহ</h1>
    <p>নীচে আমার GitHub Pages প্রজেক্টগুলোর লিঙ্ক দেওয়া আছে</p>

    <div class="projects">
        <div class="project-card">
            <h3>CC Generator</h3>
            <p>কার্ড জেনারেট করার টুল</p>
            <a href="/cc-gen/">প্রজেক্ট দেখুন</a>
        </div>

        <!-- এখান থেকে নতুন প্রজেক্ট কার্ড কপি করে বসাও -->
        <div class="project-card">
            <h3>My Second Project</h3>
            <p>বর্ণনা লিখো</p>
            <a href="/second-project/">প্রজেক্ট দেখুন</a>
        </div>
    </div>

    <footer>
        &copy; 2025 bbinl | GitHub Pages
    </footer>

</body>
</html>
